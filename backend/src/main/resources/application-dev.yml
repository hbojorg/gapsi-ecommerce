spring:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  graphql:
    graphiql:
      enabled: true
      path: /graphiql

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.gapsi.ecommerce: DEBUG
    org.springframework.graphql: DEBUG
